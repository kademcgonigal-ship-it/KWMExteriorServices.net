<!-- Static skeleton for Netlify Forms build-time detection. Do not remove. -->
<html>
  <body>
    <form name="quote-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote-request" />
      <input name="name" />
      <input name="phone" />
      <input name="email" />
      <select name="service">
        <option>Lawn Care</option>
        <option>Landscaping</option>
        <option>Holiday Lighting</option>
        <option>Haul-Off Services</option>
        <option>Property Cleanups</option>
        <option>Pressure Washing</option>
        <option>Exterior Maintenance</option>
        <option>Other</option>
      </select>
      <input name="address" />
      <textarea name="details"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
